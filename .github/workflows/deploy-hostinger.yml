name: Deploy Pindorama RPG → Hostinger

# Quando rodar:
#   - push em main      → publica automaticamente;
#   - workflow_dispatch → botão "Run workflow" na aba Actions
#                         (primeiro deploy ou redeploy sem precisar
#                         de novo commit).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_dir_override:
        description: "Sobrescreve HOSTINGER_FTP_REMOTE_DIR só nesta execução. Use '__ROOT__' para a raiz da conta FTP."
        required: false
        default: ""

# Evita publicações sobrepostas. ENFILEIRA em vez de cancelar: a
# Hostinger é lenta no FTP (55MB+ de assets) e cancelar no meio gera
# "Fatal: The operation was canceled" e deixa o servidor inconsistente.
# Com cancel-in-progress=false, runs novos esperam o anterior terminar.
concurrency:
  group: deploy-hostinger
  cancel-in-progress: false

jobs:
  deploy:
    name: Upload incremental via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Instalar lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Monta uma pasta de publicação limpa (_deploy) com rsync.
      # Só o conteúdo de _deploy vai pro FTP — assim arquivos locais
      # do dev (Zone.Identifier do WSL/Windows, .git, .env, config.php
      # etc.) ficam fora por construção, não só por exclude do lftp.
      - name: Montar pacote limpo em _deploy
        run: |
          set -euo pipefail
          rm -rf _deploy
          mkdir -p _deploy
          rsync -a \
            --exclude='_deploy/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.vscode/' \
            --exclude='.claude/' \
            --exclude='.codex/' \
            --exclude='.agents/' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='README.md' \
            --exclude='DEPLOY-HOSTINGER.md' \
            --exclude='DEPLOY_HOSTINGER.md' \
            --exclude='PORTE-GODOT.md' \
            --exclude='REGRAS-DE-*.md' \
            --exclude='docs/' \
            --exclude='tests/' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='uploads/' \
            --exclude='data/campo-batalha-state*.json' \
            --exclude='data/aventuras/*/cenas.json' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='config.php' \
            --exclude='config.local.php' \
            --exclude='secrets.*' \
            --exclude='database.sql' \
            --exclude='_pindorama_rpg.sql' \
            --exclude='*.sql.bak' \
            --exclude='*.bak' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='*:Zone.Identifier' \
            --exclude='*Zone.Identifier*' \
            ./ _deploy/

          # Defesa em profundidade: caso algum Zone.Identifier escape
          # do rsync (encoding estranho etc.), apaga in-place no _deploy.
          find _deploy -type f \( -iname '*Zone.Identifier*' -o -iname '*:Zone.Identifier' \) -print -delete || true

      # Validação obrigatória: se sobrou QUALQUER arquivo Zone.Identifier
      # dentro de _deploy, falha aqui — antes de abrir conexão FTP.
      - name: Validar pacote _deploy (sem Zone.Identifier)
        run: |
          set -euo pipefail
          residuos="$(find _deploy -iname '*Zone.Identifier*' -print || true)"
          if [ -n "$residuos" ]; then
            echo "::error::Arquivos Zone.Identifier presentes em _deploy — abortando antes do FTP:"
            echo "$residuos"
            exit 1
          fi
          echo "_deploy validado: nenhum Zone.Identifier presente."

          # Auditoria visível no log: prova que subpastas críticas
          # (lib/, data/, includes/, migrations/) estão no pacote.
          echo "--- Subpastas em _deploy ---"
          find _deploy -mindepth 1 -maxdepth 1 -type d | sort
          echo "--- _deploy/lib/ ---"
          ls -la _deploy/lib/ || echo "(ausente)"
          echo "--- _deploy/data/ (top-level JSON) ---"
          ls -la _deploy/data/*.json 2>/dev/null || echo "(ausente)"

      # ----------------------------------------------------------------
      # Publicação via lftp em modo FTP simples (porta 21). As contas
      # FTP adicionais da Hostinger NÃO suportam FTPS/TLS — `set
      # ftp:ssl-allow no` desliga qualquer tentativa de AUTH TLS.
      #
      # Usamos `mirror --reverse` sem `--only-newer` porque a Hostinger
      # pode manter mtimes remotos mais novos que o checkout do GitHub,
      # fazendo arquivos alterados serem pulados indevidamente.
      # SEM `--delete`, SEM `--delete-first`, SEM `--remove-source-files`
      # → arquivos remotos jamais são apagados.
      #
      # Secrets utilizados (nomes exatos cadastrados no repositório):
      #   HOSTINGER_FTP_HOST
      #   HOSTINGER_FTP_USER
      #   HOSTINGER_FTP_PASSWORD
      #   HOSTINGER_FTP_PORT        (opcional, default 21)
      #   HOSTINGER_FTP_REMOTE_DIR  (OBRIGATÓRIO)
      #
      # HOSTINGER_FTP_REMOTE_DIR evita publicar no lugar errado. Veja
      # docs/deploy-hostinger-subdominio.md para descobrir o valor
      # certo no hPanel antes do primeiro deploy.
      #
      # IMPORTANTE: se a conta FTP já estiver escopada na raiz do
      # subdomínio, use o sentinel literal '__ROOT__' (NÃO use '.').
      # Secrets contendo '.' fazem o GitHub mascarar todo ponto dos
      # logs como '***', inclusive em nomes de arquivos, quebrando o
      # diagnóstico. O workflow rejeita '.' explicitamente.
      # ----------------------------------------------------------------
      - name: Publicar via lftp (FTP plain, incremental, sem deletar nada)
        env:
          FTP_HOST:            ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER:            ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASSWORD:        ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_PORT:            ${{ secrets.HOSTINGER_FTP_PORT }}
          FTP_REMOTE_DIR:      ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}
          TARGET_DIR_OVERRIDE: ${{ github.event.inputs.target_dir_override }}
        run: |
          set -euo pipefail

          REMOTE_DIR="${TARGET_DIR_OVERRIDE:-${FTP_REMOTE_DIR:-}}"

          : "${FTP_HOST:?HOSTINGER_FTP_HOST não definido}"
          : "${FTP_USER:?HOSTINGER_FTP_USER não definido}"
          : "${FTP_PASSWORD:?HOSTINGER_FTP_PASSWORD não definido}"
          PORT="${FTP_PORT:-21}"

          if [ -z "$REMOTE_DIR" ]; then
            echo "::error::HOSTINGER_FTP_REMOTE_DIR precisa estar definido. Use '__ROOT__' se a conta FTP já estiver escopada na raiz do subdomínio. Veja docs/deploy-hostinger-subdominio.md."
            exit 1
          fi

          # NUNCA imprimir $REMOTE_DIR cru: se o secret contiver '.',
          # o mascaramento do GitHub vira tudo em '***' (inclusive em
          # nomes de arquivos de outras linhas), tornando o log ilegível.
          # Mostramos só o comprimento e um rótulo lógico.
          REMOTE_DIR_LEN="${#REMOTE_DIR}"

          # Guarda: recusa destinos perigosos que sobrescreveriam o site
          # principal ou outros projetos da hospedagem.
          case "$REMOTE_DIR" in
            "/"|"public_html"|"public_html/"|"public_html/."|"/public_html"|"/public_html/"|".")
              echo "::error::Destino remoto inseguro — atingiria o site principal, ou usa '.' (que o GitHub mascara como '***' nos logs). Aponte para a pasta exclusiva do subdomínio, ou use o sentinel '__ROOT__' se a conta FTP já estiver escopada nela."
              exit 1
              ;;
          esac

          if [ "$REMOTE_DIR" = "__ROOT__" ]; then
            echo "Destino: raiz da conta FTP (sentinel __ROOT__ — assume conta escopada no subdomínio)"
            CD_LINE=""
          else
            echo "Destino: subpasta da conta FTP (comprimento=$REMOTE_DIR_LEN — valor omitido por ser secret)"
            CD_LINE="mkdir -p -f \"$REMOTE_DIR\"; cd \"$REMOTE_DIR\";"
          fi

          # lftp recebe senha via -u; nada cai em logs. `set xfer:log
          # false` e `set cmdline:save-history off` reforçam isso.
          #
          # `set ftp:disable-features chmod` desliga globalmente o uso
          # do SITE CHMOD pelo lftp — a Hostinger derruba esse comando
          # em alguns diretórios (sintoma: "chmod: Access failed: 550
          # **/lib: No such file or directory" quebrando o deploy
          # mesmo com upload bem-sucedido). Sem chmod do nosso lado as
          # permissões padrão da conta FTP/Hostinger são preservadas.
          lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$PORT" "ftp://$FTP_HOST" <<EOF
            set ftp:ssl-allow no
            set ftp:passive-mode true
            set ftp:disable-features chmod
            set net:max-retries 5
            set net:reconnect-interval-base 5
            set net:timeout 120
            set xfer:log false
            set xfer:clobber yes
            set cmdline:save-history off
            set cmd:fail-exit yes
            set mirror:set-permissions no

            $CD_LINE
            lcd _deploy

            # Cria subpastas críticas explicitamente ANTES do mirror.
            # Já vimos casos em que a Hostinger falha silenciosamente
            # ao criar subdiretório novo via FTP (lib/ não é criada e
            # os PHPs dentro dela ficam fora), causando 500 em produção.
            # 'mkdir -f' não falha se a pasta já existir.
            mkdir -f assets
            mkdir -f assets/img
            mkdir -f data
            mkdir -f includes
            mkdir -f lib
            mkdir -f migrations

            # ----- MIRROR 1: código (PHP, JS, CSS, JSON, lib, etc) -----
            # Sem assets/img/ (tratado em mirror separado com --size-only,
            # ver abaixo). Sequencial (--parallel=1) porque a Hostinger
            # pode perder mkdir de subpasta nova em corrida com upload,
            # deixando lib/ vazia em produção. --continue resume uploads
            # interrompidos. SEM --delete / --delete-first.
            mirror --reverse \
                   --continue \
                   --no-symlinks \
                   --no-perms \
                   --no-umask \
                   --parallel=1 \
                   --verbose \
                   --exclude-glob 'assets/img/'       --exclude-glob 'assets/img/**' \
                   --exclude-glob '*:Zone.Identifier' --exclude-glob '*Zone.Identifier*' \
                   .

            # ----- MIRROR 2: assets/img com --size-only -----
            # Imagens só sobem se o tamanho diferir do remoto. Como
            # WebP/PNG/JPG não mudam de tamanho a menos que sejam
            # reexportadas, isso pula os 55MB inteiros num push que só
            # mexe em código — eliminando o gargalo que vinha causando
            # "operation was canceled". Sem --delete: imagens removidas
            # do repo continuam no servidor (intencional).
            mirror --reverse \
                   --continue \
                   --size-only \
                   --no-symlinks \
                   --no-perms \
                   --no-umask \
                   --parallel=1 \
                   --verbose \
                   --exclude-glob '*:Zone.Identifier' --exclude-glob '*Zone.Identifier*' \
                   assets/img assets/img

            # Auditoria pós-mirror: lista subpastas críticas no remoto
            # para o log do GitHub Actions confirmar que lib/ chegou.
            cls -la lib
            cls -la data
          EOF

          echo "Deploy concluído com sucesso."

      - name: Resumo
        if: always()
        run: |
          {
            echo "## Resumo do deploy"
            echo ""
            echo "- Branch: \`${GITHUB_REF_NAME}\` · Commit: \`${GITHUB_SHA::7}\`"
            echo "- Protocolo: \`ftp\` (porta de HOSTINGER_FTP_PORT, default 21)"
            echo "- Ferramenta: \`lftp mirror -R\` (sobrescreve versionados, sem --delete)"
            echo "- Destino: definido por \`HOSTINGER_FTP_REMOTE_DIR\` (use '__ROOT__' para raiz da conta FTP)"
          } >> "$GITHUB_STEP_SUMMARY"

name: Deploy Pindorama RPG → Hostinger

# Quando rodar:
#   - push em main      → publica automaticamente;
#   - workflow_dispatch → botão "Run workflow" na aba Actions
#                         (primeiro deploy ou redeploy sem precisar
#                         de novo commit).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita publicações sobrepostas: se um novo push chegar enquanto o
# anterior ainda está subindo, o último é cancelado e o novo prevalece.
concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload incremental via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Instalar lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # ----------------------------------------------------------------
      # Publicação via lftp em modo FTP simples (porta 21). As contas
      # FTP adicionais da Hostinger NÃO suportam FTPS/TLS — `set
      # ftp:ssl-allow no` desliga qualquer tentativa de AUTH TLS.
      #
      # Usamos `mirror --reverse` sem `--only-newer` porque a Hostinger
      # pode manter mtimes remotos mais novos que o checkout do GitHub,
      # fazendo arquivos alterados serem pulados indevidamente.
      # SEM `--delete`, SEM `--delete-first`, SEM `--remove-source-files`
      # → arquivos remotos jamais são apagados.
      #
      # Por que lftp e não FTP-Deploy-Action: o action SamKirkland/
      # FTP-Deploy-Action tem race condition de MKD no FTP plain da
      # Hostinger, que dispara "550 No such file or directory" ao
      # criar certas subpastas (ex.: lib/). lftp serializa criação e
      # upload de forma robusta e não tem esse problema.
      # ----------------------------------------------------------------
      - name: Publicar via lftp (FTP plain, incremental, sem deletar nada)
        env:
          FTP_HOST:       ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER:       ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASSWORD:   ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_PORT:       ${{ secrets.HOSTINGER_FTP_PORT }}
          # Opcional. Se vazio, publicamos no caminho real do erro PHP:
          # domains/coletivopindorama.com.br/public_html/pindorama-rpg.
          # Se a conta FTP já estiver escopada diretamente nessa pasta,
          # configure "." no secret.
          FTP_REMOTE_DIR: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}
        run: |
          set -euo pipefail

          : "${FTP_HOST:?secret HOSTINGER_FTP_HOST não definido}"
          : "${FTP_USER:?secret HOSTINGER_FTP_USER não definido}"
          : "${FTP_PASSWORD:?secret HOSTINGER_FTP_PASSWORD não definido}"
          PORT="${FTP_PORT:-21}"
          REMOTE_DIR="${FTP_REMOTE_DIR:-}"

          # Guarda: se o usuário definir manualmente algo perigoso no
          # secret REMOTE_DIR, recusa rodar.
          case "$REMOTE_DIR" in
            "/"|"public_html"|"public_html/")
              echo "::error::Destino remoto '$REMOTE_DIR' é inseguro. Deixe vazio se a conta FTP já está escopada, ou aponte para uma subpasta."
              exit 1
              ;;
          esac

          if [ -z "$REMOTE_DIR" ]; then
            REMOTE_DIR="domains/coletivopindorama.com.br/public_html/pindorama-rpg"
          fi

          if [ "$REMOTE_DIR" = "." ] || [ "$REMOTE_DIR" = "./" ]; then
            echo "Destino: ftp://$FTP_HOST:$PORT/ (raiz da conta — escopo atual da conta FTP)"
            CD_LINE=""   # conta já cai na pasta certa, sem cd
          else
            echo "Destino: ftp://$FTP_HOST:$PORT$REMOTE_DIR"
            CD_LINE="mkdir -p -f \"$REMOTE_DIR\"; cd \"$REMOTE_DIR\";"
          fi

          # lftp recebe senha via -u; nada cai em logs. `set xfer:log
          # false` e `set cmdline:save-history off` reforçam isso.
          for HOTFIX_DIR in "." "public_html/pindorama-rpg" "domains/coletivopindorama.com.br/public_html/pindorama-rpg"; do
            echo "Hotfix: tentando publicar arquivos críticos em '$HOTFIX_DIR'"
            lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$PORT" "ftp://$FTP_HOST" <<EOF || true
              set ftp:ssl-allow no
              set ftp:passive-mode true
              set net:max-retries 1
              set net:timeout 20
              set xfer:log false
              set cmd:fail-exit no

              mkdir -p -f "$HOTFIX_DIR"
              cd "$HOTFIX_DIR"
              mkdir -p -f includes
              put includes/auth.php -o includes/auth.php
              put .user.ini -o .user.ini
              put deploy-version.txt -o deploy-version.txt
          EOF
          done

          lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$PORT" "ftp://$FTP_HOST" <<EOF
            set ftp:ssl-allow no
            set ftp:passive-mode true
            set net:max-retries 3
            set net:timeout 30
            set xfer:log false
            set cmdline:save-history off
            set cmd:fail-exit yes

            $CD_LINE
            lcd .

            # mirror --reverse  = upload (local → remoto)
            # --no-symlinks     = ignora symlinks (segurança)
            # --parallel=4      = paralelismo seguro
            # SEM --delete / --delete-first / --remove-source-files
            mirror --reverse \
                   --no-symlinks \
                   --parallel=4 \
                   --verbose \
                   --exclude-glob '.git/'             --exclude-glob '.git/**' \
                   --exclude-glob '.github/'          --exclude-glob '.github/**' \
                   --exclude-glob '.claude/'          --exclude-glob '.claude/**' \
                   --exclude-glob '.codex/'           --exclude-glob '.codex/**' \
                   --exclude-glob '.agents/'          --exclude-glob '.agents/**' \
                   --exclude-glob '.vscode/'          --exclude-glob '.vscode/**' \
                   --exclude-glob '.gitignore'        --exclude-glob '.gitattributes' \
                   --exclude-glob 'README.md' \
                   --exclude-glob 'DEPLOY-HOSTINGER.md' \
                   --exclude-glob 'DEPLOY_HOSTINGER.md' \
                   --exclude-glob 'PORTE-GODOT.md'    --exclude-glob 'REGRAS-DE-*.md' \
                   --exclude-glob 'tests/'            --exclude-glob 'tests/**' \
                   --exclude-glob 'node_modules/'     --exclude-glob 'node_modules/**' \
                   --exclude-glob 'vendor/'           --exclude-glob 'vendor/**' \
                   --exclude-glob 'uploads/'          --exclude-glob 'uploads/**' \
                   --exclude-glob 'data/campo-batalha-state*.json' \
                   --exclude-glob 'data/aventuras/*/cenas.json' \
                   --exclude-glob '.env'              --exclude-glob '.env.*' \
                   --exclude-glob 'config.php' \
                   --exclude-glob 'config.local.php'  --exclude-glob 'secrets.*' \
                   --exclude-glob 'database.sql'      --exclude-glob '_pindorama_rpg.sql' \
                   --exclude-glob '*.sql.bak'         --exclude-glob '*.bak' \
                   --exclude-glob '*.log' \
                   --exclude-glob '.DS_Store'         --exclude-glob 'Thumbs.db' \
                   .
          EOF

          echo "Deploy concluído com sucesso."

      - name: Resumo
        if: always()
        run: |
          {
            echo "## Resumo do deploy"
            echo ""
            echo "- Branch: \`${GITHUB_REF_NAME}\` · Commit: \`${GITHUB_SHA::7}\`"
            echo "- Protocolo: \`ftp\` (porta vinda de HOSTINGER_FTP_PORT, default 21)"
            echo "- Ferramenta: \`lftp mirror -R\` (sobrescreve versionados, sem --delete)"
            echo "- Destino: escopo da conta FTP (\`HOSTINGER_FTP_REMOTE_DIR\` vazio = raiz da conta)"
          } >> "$GITHUB_STEP_SUMMARY"

name: Deploy Pindorama RPG → Hostinger

# Quando rodar:
#   - push em main      → publica automaticamente;
#   - workflow_dispatch → botão "Run workflow" na aba Actions
#                         (primeiro deploy ou redeploy sem precisar
#                         de novo commit).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_dir_override:
        description: "Sobrescreve HOSTINGER_TARGET_DIR só nesta execução. Use '__ROOT__' para a raiz da conta FTP."
        required: false
        default: ""

# Evita publicações sobrepostas: se um novo push chegar enquanto o
# anterior ainda está subindo, o último é cancelado e o novo prevalece.
concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload incremental via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Instalar lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Monta uma pasta de publicação limpa (_deploy) com rsync.
      # Só o conteúdo de _deploy vai pro FTP — assim arquivos locais
      # do dev (Zone.Identifier do WSL/Windows, .git, .env, config.php
      # etc.) ficam fora por construção, não só por exclude do lftp.
      - name: Montar pacote limpo em _deploy
        run: |
          set -euo pipefail
          rm -rf _deploy
          mkdir -p _deploy
          rsync -a \
            --exclude='_deploy/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.vscode/' \
            --exclude='.claude/' \
            --exclude='.codex/' \
            --exclude='.agents/' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='README.md' \
            --exclude='DEPLOY-HOSTINGER.md' \
            --exclude='DEPLOY_HOSTINGER.md' \
            --exclude='PORTE-GODOT.md' \
            --exclude='REGRAS-DE-*.md' \
            --exclude='docs/' \
            --exclude='tests/' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='uploads/' \
            --exclude='data/campo-batalha-state*.json' \
            --exclude='data/aventuras/*/cenas.json' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='config.php' \
            --exclude='config.local.php' \
            --exclude='secrets.*' \
            --exclude='database.sql' \
            --exclude='_pindorama_rpg.sql' \
            --exclude='*.sql.bak' \
            --exclude='*.bak' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='*:Zone.Identifier' \
            --exclude='*Zone.Identifier*' \
            ./ _deploy/

          # Defesa em profundidade: caso algum Zone.Identifier escape
          # do rsync (encoding estranho etc.), apaga in-place no _deploy.
          find _deploy -type f \( -iname '*Zone.Identifier*' -o -iname '*:Zone.Identifier' \) -print -delete || true

      # Validação obrigatória: se sobrou QUALQUER arquivo Zone.Identifier
      # dentro de _deploy, falha aqui — antes de abrir conexão FTP.
      - name: Validar pacote _deploy (sem Zone.Identifier)
        run: |
          set -euo pipefail
          residuos="$(find _deploy -iname '*Zone.Identifier*' -print || true)"
          if [ -n "$residuos" ]; then
            echo "::error::Arquivos Zone.Identifier presentes em _deploy — abortando antes do FTP:"
            echo "$residuos"
            exit 1
          fi
          echo "_deploy validado: nenhum Zone.Identifier presente."

      # ----------------------------------------------------------------
      # Publicação via lftp em modo FTP simples (porta 21). As contas
      # FTP adicionais da Hostinger NÃO suportam FTPS/TLS — `set
      # ftp:ssl-allow no` desliga qualquer tentativa de AUTH TLS.
      #
      # Usamos `mirror --reverse` sem `--only-newer` porque a Hostinger
      # pode manter mtimes remotos mais novos que o checkout do GitHub,
      # fazendo arquivos alterados serem pulados indevidamente.
      # SEM `--delete`, SEM `--delete-first`, SEM `--remove-source-files`
      # → arquivos remotos jamais são apagados.
      #
      # Secrets aceitos (nomes novos têm preferência; nomes antigos
      # continuam funcionando para não quebrar deploys existentes):
      #   HOSTINGER_HOST       (fallback: HOSTINGER_FTP_HOST)
      #   HOSTINGER_USERNAME   (fallback: HOSTINGER_FTP_USER)
      #   HOSTINGER_PASSWORD   (fallback: HOSTINGER_FTP_PASSWORD)
      #   HOSTINGER_PORT       (fallback: HOSTINGER_FTP_PORT, default 21)
      #   HOSTINGER_TARGET_DIR (fallback: HOSTINGER_FTP_REMOTE_DIR)
      #
      # HOSTINGER_TARGET_DIR é OBRIGATÓRIO para evitar publicar no lugar
      # errado. Veja docs/deploy-hostinger-subdominio.md para descobrir
      # o valor certo no hPanel antes do primeiro deploy.
      #
      # IMPORTANTE: se a conta FTP já estiver escopada na raiz do
      # subdomínio, use o sentinel literal '__ROOT__' (NÃO use '.').
      # Secrets contendo '.' fazem o GitHub mascarar todo ponto dos
      # logs como '***', inclusive em nomes de arquivos, quebrando o
      # diagnóstico. O workflow rejeita '.' explicitamente.
      # ----------------------------------------------------------------
      - name: Publicar via lftp (FTP plain, incremental, sem deletar nada)
        env:
          FTP_HOST_NEW:       ${{ secrets.HOSTINGER_HOST }}
          FTP_HOST_OLD:       ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER_NEW:       ${{ secrets.HOSTINGER_USERNAME }}
          FTP_USER_OLD:       ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASSWORD_NEW:   ${{ secrets.HOSTINGER_PASSWORD }}
          FTP_PASSWORD_OLD:   ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_PORT_NEW:       ${{ secrets.HOSTINGER_PORT }}
          FTP_PORT_OLD:       ${{ secrets.HOSTINGER_FTP_PORT }}
          FTP_REMOTE_DIR_NEW: ${{ secrets.HOSTINGER_TARGET_DIR }}
          FTP_REMOTE_DIR_OLD: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}
          TARGET_DIR_OVERRIDE: ${{ github.event.inputs.target_dir_override }}
        run: |
          set -euo pipefail

          FTP_HOST="${FTP_HOST_NEW:-${FTP_HOST_OLD:-}}"
          FTP_USER="${FTP_USER_NEW:-${FTP_USER_OLD:-}}"
          FTP_PASSWORD="${FTP_PASSWORD_NEW:-${FTP_PASSWORD_OLD:-}}"
          FTP_PORT="${FTP_PORT_NEW:-${FTP_PORT_OLD:-}}"
          REMOTE_DIR="${TARGET_DIR_OVERRIDE:-${FTP_REMOTE_DIR_NEW:-${FTP_REMOTE_DIR_OLD:-}}}"

          : "${FTP_HOST:?HOSTINGER_HOST (ou HOSTINGER_FTP_HOST) não definido}"
          : "${FTP_USER:?HOSTINGER_USERNAME (ou HOSTINGER_FTP_USER) não definido}"
          : "${FTP_PASSWORD:?HOSTINGER_PASSWORD (ou HOSTINGER_FTP_PASSWORD) não definido}"
          PORT="${FTP_PORT:-21}"

          if [ -z "$REMOTE_DIR" ]; then
            echo "::error::HOSTINGER_TARGET_DIR (ou HOSTINGER_FTP_REMOTE_DIR) precisa estar definido. Use '__ROOT__' se a conta FTP já estiver escopada na raiz do subdomínio. Veja docs/deploy-hostinger-subdominio.md."
            exit 1
          fi

          # NUNCA imprimir $REMOTE_DIR cru: se o secret contiver '.',
          # o mascaramento do GitHub vira tudo em '***' (inclusive em
          # nomes de arquivos de outras linhas), tornando o log ilegível.
          # Mostramos só o comprimento e um rótulo lógico.
          REMOTE_DIR_LEN="${#REMOTE_DIR}"

          # Guarda: recusa destinos perigosos que sobrescreveriam o site
          # principal ou outros projetos da hospedagem.
          case "$REMOTE_DIR" in
            "/"|"public_html"|"public_html/"|"public_html/."|"/public_html"|"/public_html/"|".")
              echo "::error::Destino remoto inseguro — atingiria o site principal, ou usa '.' (que o GitHub mascara como '***' nos logs). Aponte para a pasta exclusiva do subdomínio, ou use o sentinel '__ROOT__' se a conta FTP já estiver escopada nela."
              exit 1
              ;;
          esac

          if [ "$REMOTE_DIR" = "__ROOT__" ]; then
            echo "Destino: raiz da conta FTP (sentinel __ROOT__ — assume conta escopada no subdomínio)"
            CD_LINE=""
          else
            echo "Destino: subpasta da conta FTP (comprimento=$REMOTE_DIR_LEN — valor omitido por ser secret)"
            CD_LINE="mkdir -p -f \"$REMOTE_DIR\"; cd \"$REMOTE_DIR\";"
          fi

          # lftp recebe senha via -u; nada cai em logs. `set xfer:log
          # false` e `set cmdline:save-history off` reforçam isso.
          #
          # `set ftp:disable-features chmod` desliga globalmente o uso
          # do SITE CHMOD pelo lftp — a Hostinger derruba esse comando
          # em alguns diretórios (sintoma: "chmod: Access failed: 550
          # **/lib: No such file or directory" quebrando o deploy
          # mesmo com upload bem-sucedido). Sem chmod do nosso lado as
          # permissões padrão da conta FTP/Hostinger são preservadas.
          lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$PORT" "ftp://$FTP_HOST" <<EOF
            set ftp:ssl-allow no
            set ftp:passive-mode true
            set ftp:disable-features chmod
            set net:max-retries 3
            set net:timeout 30
            set xfer:log false
            set cmdline:save-history off
            set cmd:fail-exit yes

            $CD_LINE
            lcd _deploy

            # mirror --reverse  = upload (local → remoto)
            # --no-symlinks     = ignora symlinks (segurança)
            # --no-perms        = não tenta chmod nos arquivos enviados
            # --no-umask        = não aplica umask remoto (depende de chmod)
            # --parallel=4      = paralelismo seguro
            # SEM --delete / --delete-first / --remove-source-files
            # Origem é _deploy/, já filtrada — exclude-glob aqui é só
            # cinto-e-suspensório contra Zone.Identifier residual.
            mirror --reverse \
                   --no-symlinks \
                   --no-perms \
                   --no-umask \
                   --parallel=4 \
                   --verbose \
                   --exclude-glob '*:Zone.Identifier' --exclude-glob '*Zone.Identifier*' \
                   .
          EOF

          echo "Deploy concluído com sucesso."

      - name: Resumo
        if: always()
        run: |
          {
            echo "## Resumo do deploy"
            echo ""
            echo "- Branch: \`${GITHUB_REF_NAME}\` · Commit: \`${GITHUB_SHA::7}\`"
            echo "- Protocolo: \`ftp\` (porta de HOSTINGER_PORT, default 21)"
            echo "- Ferramenta: \`lftp mirror -R\` (sobrescreve versionados, sem --delete)"
            echo "- Destino: definido por \`HOSTINGER_TARGET_DIR\` (use '.' para raiz da conta FTP)"
          } >> "$GITHUB_STEP_SUMMARY"
